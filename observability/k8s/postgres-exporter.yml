apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: betops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      # hostNetwork required to reach RDS via Tailscale routes on the host
      hostNetwork: true
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/hostname: worker-node01
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/betops?sslmode=require"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 9187
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: betops
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
