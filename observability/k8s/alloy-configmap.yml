apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: betops
data:
  config.alloy: |
    // ── Scrape worker metrics ─────────────────────────────────────────────
    prometheus.scrape "worker" {
      targets = [{"__address__" = "betops-worker-metrics:8080"}]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    // ── Scrape postgres-exporter ──────────────────────────────────────────
    prometheus.scrape "postgres" {
      targets = [{"__address__" = "postgres-exporter:9187"}]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    // ── Scrape SQS exporter ───────────────────────────────────────────────
    prometheus.scrape "sqs" {
      targets = [{"__address__" = "sqs-exporter:8000"}]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    // ── Ship metrics to Grafana Cloud ─────────────────────────────────────
    prometheus.remote_write "grafana_cloud" {
      endpoint {
        url = "https://prometheus-prod-66-prod-us-east-3.grafana.net/api/prom/push"

        basic_auth {
          username = "3313604"
          password = env("GRAFANA_CLOUD_API_KEY")
        }
      }
    }

    // ── Collect pod logs from betops namespace ────────────────────────────
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["betops"]
      }
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    // ── Ship logs to Grafana Cloud ────────────────────────────────────────
    loki.write "grafana_cloud" {
      endpoint {
        url = "https://logs-prod-042.grafana.net/loki/api/v1/push"

        basic_auth {
          username = "1652477"
          password = env("GRAFANA_CLOUD_API_KEY")
        }
      }
    }
