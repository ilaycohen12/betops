apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-exporter
  namespace: betops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqs-exporter
  template:
    metadata:
      labels:
        app: sqs-exporter
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node01
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sqs-exporter
          image: ghcr.io/ilaycohen12/betops-sqs-exporter:latest
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: SQS_QUEUE_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sqs-exporter
  namespace: betops
spec:
  selector:
    app: sqs-exporter
  ports:
    - port: 8000
      targetPort: 8000
