apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: betops
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: betops-prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: betops
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: betops
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: betops
data:
  betops-worker.json: |
    {
      "id": null,
      "uid": "betops-worker",
      "title": "betops Worker",
      "tags": ["betops"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Messages Processed / min",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
              "expr": "rate(betops_messages_processed_total[5m]) * 60",
              "legendFormat": "{{event}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Processing Errors / min",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "red"}},
            "overrides": []
          },
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
              "expr": "rate(betops_message_errors_total[5m]) * 60",
              "legendFormat": "errors",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Settlement Duration",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
              "expr": "histogram_quantile(0.50, rate(betops_settlement_duration_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
              "expr": "histogram_quantile(0.95, rate(betops_settlement_duration_seconds_bucket[5m]))",
              "legendFormat": "p95",
              "refId": "B"
            }
          ]
        },
        {
          "id": 4,
          "title": "Markets Auto-Closed / min",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "betops-prometheus"},
              "expr": "rate(betops_markets_auto_closed_total[5m]) * 60",
              "legendFormat": "auto-closed",
              "refId": "A"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: betops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: betops-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: betops
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32300
