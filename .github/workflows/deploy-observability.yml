name: Deploy Observability

on:
  push:
    branches: [main]
    paths:
      - 'observability/**'
      - 'worker/k8s/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ilaycohen12/betops-sqs-exporter

jobs:
  build-push:
    name: Build and push sqs-exporter
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./observability/sqs-exporter
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes

      - name: Setup kubectl
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Apply worker metrics service
        run: kubectl apply --validate=false -f worker/k8s/metrics-service.yml

      - name: Apply observability manifests
        run: |
          kubectl apply --validate=false -f observability/k8s/alloy-configmap.yml
          kubectl apply --validate=false -f observability/k8s/alloy-deployment.yml
          kubectl apply --validate=false -f observability/k8s/postgres-exporter.yml
          sed "s|betops-sqs-exporter:latest|betops-sqs-exporter:${{ needs.build-push.outputs.sha_tag }}|" \
            observability/k8s/sqs-exporter.yml | kubectl apply --validate=false -f -

      - name: Wait for rollouts
        continue-on-error: true
        run: |
          kubectl rollout status deployment/alloy -n betops --timeout=120s
          kubectl rollout status deployment/postgres-exporter -n betops --timeout=120s
          kubectl rollout status deployment/sqs-exporter -n betops --timeout=120s
