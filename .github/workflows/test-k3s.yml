name: Test k3s Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes

      - name: Setup kubectl
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Test cluster connection
        run: |
          kubectl get nodes
          echo "---"
          kubectl get pods -A
          echo "---"
          kubectl describe pod -n betops -l app=betops-worker 2>/dev/null || echo "no worker pod found"
          echo "--- WORKER LOGS (last 80 lines) ---"
          kubectl logs -n betops -l app=betops-worker --tail=80 2>/dev/null || echo "no worker logs"

      - name: Test RDS reachability from runner (via Tailscale)
        run: |
          echo "Testing from GitHub Actions runner (uses Tailscale --accept-routes)..."
          nc -zv 10.0.3.228 5432 && echo "RUNNER → RDS: REACHABLE" || echo "RUNNER → RDS: UNREACHABLE"

      - name: Test RDS reachability from cluster pod
        run: |
          echo "Testing from inside a k3s pod (uses homelab Tailscale routes)..."
          kubectl run rds-test --image=busybox --restart=Never --rm -i \
            --timeout=30s \
            -- sh -c "nc -zv 10.0.3.228 5432 && echo 'POD → RDS: REACHABLE' || echo 'POD → RDS: UNREACHABLE'" \
            2>/dev/null || echo "connectivity test timed out or failed"
