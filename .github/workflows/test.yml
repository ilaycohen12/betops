name: Tests

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'lambdas/**'
      - 'worker/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'lambdas/**'
      - 'worker/**'

jobs:

  # ── Lambda tests ──────────────────────────────────────────────────────────
  test-lambda:
    name: Test Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r lambdas/api/requirements-dev.txt

      - name: Run tests
        run: pytest lambdas/api/ -v --cov=lambdas/api --cov-report=term-missing

  # ── Worker tests ──────────────────────────────────────────────────────────
  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r worker/requirements-dev.txt boto3

      - name: Run tests
        run: pytest worker/ -v --cov=worker --cov-report=term-missing
