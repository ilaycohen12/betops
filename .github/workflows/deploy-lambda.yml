name: Deploy Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'lambdas/**'

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1

jobs:

  # ── Determine environment ─────────────────────────────────────────────────
  set-env:
    name: Set environment
    runs-on: ubuntu-latest
    outputs:
      function_name: ${{ steps.env.outputs.function_name }}
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "function_name=betops-api" >> $GITHUB_OUTPUT
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "function_name=betops-dev-api" >> $GITHUB_OUTPUT
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r lambdas/api/requirements-dev.txt psycopg2-binary

      - name: Run tests
        run: pytest lambdas/api/ -v

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Lambda (${{ needs.set-env.outputs.env_name }})
    runs-on: ubuntu-latest
    needs: [set-env, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle dependencies
        run: |
          pip install -r lambdas/api/requirements.txt -t lambdas/api/package/
          cd lambdas/api/package && zip -r ../../../lambda.zip . && cd ..
          zip -g ../../lambda.zip handler.py

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ needs.set-env.outputs.function_name }} \
            --zip-file fileb://lambda.zip

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ needs.set-env.outputs.function_name }}

      - name: Print deployed version
        run: |
          aws lambda get-function-configuration \
            --function-name ${{ needs.set-env.outputs.function_name }} \
            --query '[FunctionName, CodeSize, LastModified]' \
            --output table
