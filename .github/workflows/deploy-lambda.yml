name: Deploy Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r lambdas/api/requirements-dev.txt psycopg2-binary

      - name: Run tests
        run: pytest lambdas/api/ -v

  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bundle dependencies
        run: |
          pip install -r lambdas/api/requirements.txt -t lambdas/api/package/
          cd lambdas/api/package && zip -r ../../../lambda.zip . && cd ..
          zip -g ../../lambda.zip handler.py

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name betops-api \
            --zip-file fileb://lambda.zip

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name betops-api

      - name: Print deployed version
        run: |
          aws lambda get-function-configuration \
            --function-name betops-api \
            --query '[FunctionName, CodeSize, LastModified]' \
            --output table
