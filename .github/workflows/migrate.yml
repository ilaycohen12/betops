name: Run DB Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, dev]
      action:
        description: 'Action to run'
        required: true
        default: 'migrate'
        type: choice
        options: [migrate, seed]

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1

jobs:
  migrate:
    name: Migrate (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Resolve secret ARN for dev
        id: secret
        if: inputs.environment == 'dev'
        run: |
          ARN=$(aws secretsmanager describe-secret \
            --secret-id betops/dev-db-credentials \
            --query 'ARN' --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Invoke Lambda (prod)
        if: inputs.environment == 'prod'
        run: |
          aws lambda invoke \
            --function-name betops-api \
            --payload "{\"action\":\"${{ inputs.action }}\"}" \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json

      - name: Invoke Lambda (dev — targets betops_dev on prod RDS)
        if: inputs.environment == 'dev'
        run: |
          aws lambda invoke \
            --function-name betops-api \
            --payload "{\"action\":\"${{ inputs.action }}\",\"db_secret_arn\":\"${{ steps.secret.outputs.arn }}\"}" \
            --cli-binary-format raw-in-base64-out \
            response.json
          cat response.json
