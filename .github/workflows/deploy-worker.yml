name: Deploy Worker

on:
  push:
    branches: [main, dev]
    paths: ['worker/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ilaycohen12/betops-worker

jobs:

  set-env:
    name: Set environment
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ steps.env.outputs.namespace }}
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "namespace=betops" >> $GITHUB_OUTPUT
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "namespace=betops-dev" >> $GITHUB_OUTPUT
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -r worker/requirements-dev.txt
      - run: pytest worker/ -v

  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to k3s (${{ needs.set-env.outputs.env_name }})
    runs-on: ubuntu-latest
    needs: [set-env, build-push]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes

      - name: Setup kubectl
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Wait for k3s API reachability
        run: |
          echo "Waiting for k3s API at 100.81.132.76:6443..."
          for i in $(seq 1 12); do
            if nc -z -w 5 100.81.132.76 6443 2>/dev/null; then
              echo "k3s API reachable"
              break
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          nc -z -w 5 100.81.132.76 6443 || (echo "k3s API unreachable after 60s" && exit 1)

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Set env-specific secrets
        run: |
          if [ "${{ needs.set-env.outputs.env_name }}" = "prod" ]; then
            echo "DEPLOY_SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_HOST=${{ secrets.DB_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_USER=${{ secrets.DB_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_SQS_QUEUE_URL=${{ secrets.DEV_SQS_QUEUE_URL }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_HOST=${{ secrets.DEV_DB_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_USER=${{ secrets.DEV_DB_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Create namespace
        run: |
          kubectl create namespace ${{ needs.set-env.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Create GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --namespace=${{ needs.set-env.outputs.namespace }} \
            --docker-server=ghcr.io \
            --docker-username=ilaycohen12 \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Apply secrets
        run: |
          kubectl create secret generic betops-secrets \
            --namespace=${{ needs.set-env.outputs.namespace }} \
            --from-literal=SQS_QUEUE_URL="$DEPLOY_SQS_QUEUE_URL" \
            --from-literal=DB_HOST="$DEPLOY_DB_HOST" \
            --from-literal=DB_NAME="betops" \
            --from-literal=DB_USER="$DEPLOY_DB_USER" \
            --from-literal=DB_PASSWORD="$DEPLOY_DB_PASSWORD" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Deploy worker
        run: |
          helm upgrade --install betops-worker worker/k8s/ \
            --namespace ${{ needs.set-env.outputs.namespace }} \
            --set namespace=${{ needs.set-env.outputs.namespace }} \
            --set image.tag=${{ needs.build-push.outputs.sha_tag }}

      - name: Wait for rollout
        continue-on-error: true
        run: |
          kubectl rollout status deployment/betops-worker \
            -n ${{ needs.set-env.outputs.namespace }} --timeout=120s
