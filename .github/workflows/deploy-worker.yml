name: Deploy Worker

on:
  push:
    branches: [main]
    paths: ['worker/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ilaycohen12/betops-worker

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -r worker/requirements-dev.txt
      - run: pytest worker/ -v

  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes

      - name: Setup kubectl
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Create namespace
        run: kubectl apply --validate=false -f worker/k8s/namespace.yml

      - name: Create GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --namespace=betops \
            --docker-server=ghcr.io \
            --docker-username=ilaycohen12 \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Apply secrets
        run: |
          kubectl create secret generic betops-secrets \
            --namespace=betops \
            --from-literal=SQS_QUEUE_URL="${{ secrets.SQS_QUEUE_URL }}" \
            --from-literal=DB_HOST="${{ secrets.DB_HOST }}" \
            --from-literal=DB_NAME="betops" \
            --from-literal=DB_USER="${{ secrets.DB_USER }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Deploy worker
        run: |
          sed "s|betops-worker:latest|betops-worker:${{ needs.build-push.outputs.sha_tag }}|" \
            worker/k8s/deployment.yml | kubectl apply --validate=false -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/betops-worker -n betops --timeout=600s
