name: Deploy Worker

on:
  push:
    branches: [main]
    paths: ['worker/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ilaycohen12/betops-worker

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -r worker/requirements-dev.txt
      - run: pytest worker/ -v

  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      sha_tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:latest

  bump-tag:
    name: Bump image tag in betops-infra
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout betops-infra
        uses: actions/checkout@v4
        with:
          repository: ilaycohen12/betops-infra
          token: ${{ secrets.INFRA_REPO_PAT }}

      - name: Update worker image tag
        run: |
          sed -i "s|^  tag:.*|  tag: ${{ needs.build-push.outputs.sha_tag }}|" helm/worker/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump worker to ${{ needs.build-push.outputs.sha_tag }}"
          git push
