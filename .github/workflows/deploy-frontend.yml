name: Deploy Frontend

on:
  push:
    branches: [main, dev]
    paths: ['frontend/**']
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1

jobs:

  set-env:
    name: Set environment
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.env.outputs.bucket }}
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "bucket=betops-frontend" >> $GITHUB_OUTPUT
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "bucket=betops-dev-frontend" >> $GITHUB_OUTPUT
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Build and deploy frontend (${{ needs.set-env.outputs.env_name }})
    runs-on: ubuntu-latest
    needs: set-env
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Set API URL
        run: |
          if [ "${{ needs.set-env.outputs.env_name }}" = "prod" ]; then
            echo "VITE_API_URL=${{ secrets.API_URL }}" >> $GITHUB_ENV
          else
            echo "VITE_API_URL=${{ secrets.DEV_API_URL }}" >> $GITHUB_ENV
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.set-env.outputs.bucket }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          BUCKET="${{ needs.set-env.outputs.bucket }}"
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Origins.Items[0].DomainName,'${BUCKET}.')].Id | [0]" \
            --output text)
          echo "Distribution ID: $DIST_ID"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          DOMAIN=$(aws cloudfront get-distribution --id "$DIST_ID" --query "Distribution.DomainName" --output text)
          echo "## Frontend deployed (${{ needs.set-env.outputs.env_name }})" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://$DOMAIN" >> $GITHUB_STEP_SUMMARY
