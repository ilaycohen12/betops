name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'terraform/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:

  # ── Determine environment ─────────────────────────────────────────────────
  set-env:
    name: Set environment
    runs-on: ubuntu-latest
    outputs:
      tf_env: ${{ steps.env.outputs.tf_env }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "tf_env=prod" >> $GITHUB_OUTPUT
          else
            echo "tf_env=dev" >> $GITHUB_OUTPUT
          fi

  # ── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint Terraform
    runs-on: ubuntu-latest
    needs: set-env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: |
          tflint --init
          tflint

  # ── Job 2: Plan ──────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan (${{ needs.set-env.outputs.tf_env }})
    runs-on: ubuntu-latest
    needs: [set-env, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/envs/${{ needs.set-env.outputs.tf_env }}/.terraform
          key: terraform-${{ env.TF_VERSION }}-${{ needs.set-env.outputs.tf_env }}-${{ hashFiles(format('terraform/envs/{0}/.terraform.lock.hcl', needs.set-env.outputs.tf_env)) }}
          restore-keys: terraform-${{ env.TF_VERSION }}-${{ needs.set-env.outputs.tf_env }}-

      - name: Terraform Init
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: terraform plan -out=tfplan

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const env = '${{ needs.set-env.outputs.tf_env }}';
            const plan = execSync('terraform show -no-color tfplan', { cwd: `terraform/envs/${env}` }).toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan (${env})\n\`\`\`hcl\n${plan}\n\`\`\``
            });

  # ── Job 3: Apply ─────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply (${{ needs.set-env.outputs.tf_env }})
    runs-on: ubuntu-latest
    needs: [set-env, plan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/envs/${{ needs.set-env.outputs.tf_env }}/.terraform
          key: terraform-${{ env.TF_VERSION }}-${{ needs.set-env.outputs.tf_env }}-${{ hashFiles(format('terraform/envs/{0}/.terraform.lock.hcl', needs.set-env.outputs.tf_env)) }}
          restore-keys: terraform-${{ env.TF_VERSION }}-${{ needs.set-env.outputs.tf_env }}-

      - name: Terraform Init
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: terraform init

      # Import existing resources that were created before modularization
      # Each import is safe to run even if the resource is already in state (|| true)
      - name: Terraform Import existing resources
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: |
          terraform import module.lambda.aws_iam_role.lambda_exec ${{ needs.set-env.outputs.tf_env == 'prod' && 'betops-lambda-exec' || 'betops-dev-lambda-exec' }} || true
          terraform import aws_route.private_nat "rtb-049f55b74c23570dd_0.0.0.0/0" || true

      - name: Terraform Apply
        working-directory: terraform/envs/${{ needs.set-env.outputs.tf_env }}
        run: terraform apply -auto-approve
